{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>
        Employer Login
    </title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>


<body>


<div class="auth-container">


    <div class="auth-card">


        <h2>
            Employer Login
        </h2>


        <p class="auth-subtitle">
            Login to manage jobs and find talented candidates
        </p>



        <form method="POST">

            {% csrf_token %}



            <div class="form-group">


                <label>
                    Username
                </label>


                <input 
                    type="text"
                    name="username"
                    placeholder="Enter your company username"
                    required>


            </div>




            <div class="form-group">


                <label>
                    Password
                </label>


                <input 
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>


            </div>




            <button class="btn btn-primary">


                Login


            </button>



        </form>





        <p class="login-link">


            New Employer?


            <a href="{% url 'company_register' %}">

                Register Company

            </a>


        </p>




    </div>


</div>



</body>

</html>
