{% extends 'accounts/jobseeker_base.html' %}
{% load static %}

{% block title %}AI Mock Interview{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <h1 class="text-4xl font-serif font-semibold text-light-text dark:text-white mb-3">
        👔 AI Mock Interview
    </h1>

    <p class="text-light-muted dark:text-brand-textMuted mb-10">
        Practice interview questions generated by AI and receive instant feedback.
    </p>

    <div class="bg-light-card dark:bg-brand-card rounded-xl border border-light-border dark:border-brand-border p-8">

        <form method="POST">
            {% csrf_token %}

            <label class="block text-lg font-medium mb-3 text-light-text dark:text-white">
                Job Role
            </label>

            <input
                type="text"
                name="role"
                placeholder="Example: Python Developer"
                required
                class="w-full px-4 py-3 rounded-lg border border-light-border dark:border-brand-border bg-light-bg dark:bg-brand-bg text-light-text dark:text-white mb-8">

            <button
                type="submit"
                class="w-full py-3 rounded-lg bg-amber-600 text-white hover:bg-amber-700 transition">

                Start Interview

            </button>

        </form>

    </div>

</div>

{% endblock %}
