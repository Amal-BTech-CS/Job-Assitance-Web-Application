{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>
        Job Seeker Login
    </title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>


<body>


<div class="auth-container">


    <div class="auth-card">


        <h2>
            Job Seeker Login
        </h2>


        <p class="auth-subtitle">
            Welcome back! Login to find your opportunities
        </p>



        <form method="POST">

            {% csrf_token %}



            <div class="form-group">

                <label>
                    Username
                </label>

                <input 
                    type="text"
                    name="username"
                    placeholder="Enter your username"
                    required>

            </div>




            <div class="form-group">

                <label>
                    Password
                </label>


                <input 
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>




            <button class="btn btn-primary">

                Login

            </button>



        </form>




        <p class="login-link">

            Don't have an account?

            <a href="{% url 'jobseeker_register' %}">
                Register
            </a>

        </p>



    </div>


</div>



</body>

</html>
