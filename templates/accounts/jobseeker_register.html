{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>
        Job Seeker Registration
    </title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>


<body>


<div class="auth-container">


<div class="auth-card">


<h2>
Create Job Seeker Account
</h2>


<p class="auth-subtitle">
Join our platform and find your dream job
</p>



<form method="POST">

{% csrf_token %}



<div class="form-group">

<label>
Username
</label>

{{ form.username }}

</div>




<div class="form-group">

<label>
Email
</label>

{{ form.email }}

</div>





<div class="form-group">

<label>
Password
</label>

{{ form.password }}

</div>




<div class="form-group">

<label>
Confirm Password
</label>

{{ form.confirm_password }}

</div>




<button type="submit" class="btn btn-primary">

Create Account

</button>



</form>





<p class="login-link">

Already have an account?

<a href="{% url 'jobseeker_login' %}">
Login
</a>


</p>



</div>


</div>


</body>

</html>
