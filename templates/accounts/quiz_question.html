{% extends 'accounts/jobseeker_base.html' %}
{% load static %}

{% block title %}AI Quiz - CareerPilot{% endblock %}

{% block content %}

<!-- Header -->
<div class="mb-8 text-center">
    <h1 class="text-4xl font-serif font-semibold text-light-text dark:text-white mb-2">
        🧠 AI Quiz
    </h1>

    <p class="text-light-muted dark:text-brand-textMuted">
        Read the question carefully and choose the correct answer.
    </p>
</div>

<!-- Question Card -->
<div class="max-w-2xl mx-auto bg-light-card dark:bg-brand-card border border-light-border dark:border-brand-border rounded-xl p-8">

    <pre class="whitespace-pre-wrap font-sans text-lg text-light-text dark:text-white mb-8">
{{ q.question }}
    </pre>

    <form method="POST">
        {% csrf_token %}

        <!-- Options -->
        <div class="grid grid-cols-2 gap-4 w-96 mx-auto">

            <!-- A -->
            <button
                {% if not answered %}
                    type="submit"
                    name="answer"
                    value="A"
                {% else %}
                    type="button"
                {% endif %}

                class="h-14 rounded-lg border transition
                {% if answered %}
                    {% if q.answer == 'A' %}
                        bg-green-600 text-white border-green-600
                    {% elif selected == 'A' %}
                        bg-red-600 text-white border-red-600
                    {% else %}
                        border-light-border dark:border-brand-border
                    {% endif %}
                {% else %}
                    border-light-border dark:border-brand-border hover:bg-amber-600 hover:text-white
                {% endif %}"

                {% if answered %}disabled{% endif %}
            >
                A
            </button>

            <!-- B -->
            <button
                {% if not answered %}
                    type="submit"
                    name="answer"
                    value="B"
                {% else %}
                    type="button"
                {% endif %}

                class="h-14 rounded-lg border transition
                {% if answered %}
                    {% if q.answer == 'B' %}
                        bg-green-600 text-white border-green-600
                    {% elif selected == 'B' %}
                        bg-red-600 text-white border-red-600
                    {% else %}
                        border-light-border dark:border-brand-border
                    {% endif %}
                {% else %}
                    border-light-border dark:border-brand-border hover:bg-amber-600 hover:text-white
                {% endif %}"

                {% if answered %}disabled{% endif %}
            >
                B
            </button>

            <!-- C -->
            <button
                {% if not answered %}
                    type="submit"
                    name="answer"
                    value="C"
                {% else %}
                    type="button"
                {% endif %}

                class="h-14 rounded-lg border transition
                {% if answered %}
                    {% if q.answer == 'C' %}
                        bg-green-600 text-white border-green-600
                    {% elif selected == 'C' %}
                        bg-red-600 text-white border-red-600
                    {% else %}
                        border-light-border dark:border-brand-border
                    {% endif %}
                {% else %}
                    border-light-border dark:border-brand-border hover:bg-amber-600 hover:text-white
                {% endif %}"

                {% if answered %}disabled{% endif %}
            >
                C
            </button>

            <!-- D -->
            <button
                {% if not answered %}
                    type="submit"
                    name="answer"
                    value="D"
                {% else %}
                    type="button"
                {% endif %}

                class="h-14 rounded-lg border transition
                {% if answered %}
                    {% if q.answer == 'D' %}
                        bg-green-600 text-white border-green-600
                    {% elif selected == 'D' %}
                        bg-red-600 text-white border-red-600
                    {% else %}
                        border-light-border dark:border-brand-border
                    {% endif %}
                {% else %}
                    border-light-border dark:border-brand-border hover:bg-amber-600 hover:text-white
                {% endif %}"

                {% if answered %}disabled{% endif %}
            >
                D
            </button>

        </div>

        {% if answered %}
        <div class="mt-8 flex justify-center">
            <button
                type="submit"
                name="next"
                class="px-8 py-3 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition">
                Next Question →
            </button>
        </div>
        {% endif %}

    </form>

</div>

{% endblock %}
